spring.application.name=ProyectoSolicitudes

# ==================== H2 DataSource ====================
spring.datasource.url=jdbc:h2:mem:solicitudesdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==================== JPA / Hibernate ====================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==================== H2 Console ====================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ==================== Inicializacion SQL ====================
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# ==================== OpenAPI / Swagger UI ====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
# ==================== JWT Security ====================
jwt.expiry=30
jwt.secret=MiClaveSecretaSuperSeguraParaJWT2026EnProgramacionAvanzadaUniquindio

# ==================== Seed de Usuarios por Defecto ====================
default-users.users[0].username=admin@solicitudes.com
default-users.users[0].password=admin123
default-users.users[0].role=ADMIN
default-users.users[1].username=agente@solicitudes.com
default-users.users[1].password=agente123
default-users.users[1].role=USER
