# H2 en memoria para tests (aislado de producción)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Desactivar el data.sql de producción durante tests
spring.sql.init.mode=never

# Misma clave JWT que producción (requerida por JwtConfig)
jwt.secret=MiClaveSecretaSuperSeguraParaJWT2026EnProgramacionAvanzadaUniquindio
jwt.expiry=5

# Desactivar usuarios semilla de producción durante tests
default-users.users[0].username=admin@test.com
default-users.users[0].password=admin123
default-users.users[0].role=ADMIN